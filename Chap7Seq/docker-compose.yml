services:
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /home/notebooks
    shm_size: "32gb"
    ports:
      - "8888:8888"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ~/Documents/git_doc/DeepLearningBookExamples/Chap7Seq:/home/notebooks
      - .:/app
